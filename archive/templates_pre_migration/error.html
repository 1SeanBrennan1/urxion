<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Something went wrong | Urxion</title>
        <meta name="robots" content="noindex" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 2rem;
                font-family:
                    Inter,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                background:
                    radial-gradient(
                        circle at top,
                        rgba(37, 99, 235, 0.16),
                        transparent 34rem
                    ),
                    #f8fafc;
                color: #0f172a;
            }
            .card {
                width: min(100%, 680px);
                background: #fff;
                border: 1px solid rgba(15, 23, 42, 0.1);
                border-radius: 28px;
                box-shadow: 0 30px 80px rgba(15, 23, 42, 0.12);
                padding: clamp(1.5rem, 5vw, 3rem);
                text-align: center;
            }
            .eyebrow {
                color: #2563eb;
                font-weight: 900;
                text-transform: uppercase;
                letter-spacing: 0.16em;
                font-size: 0.78rem;
            }
            h1 {
                margin: 0.75rem 0 1rem;
                font-size: clamp(2.25rem, 7vw, 4.5rem);
                letter-spacing: -0.06em;
                line-height: 0.95;
            }
            p {
                color: #475569;
                font-size: 1.1rem;
                line-height: 1.7;
                margin: 0 auto 2rem;
                max-width: 34rem;
            }
            .actions {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.85rem;
            }
            a {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 3rem;
                padding: 0 1.25rem;
                border-radius: 999px;
                font-weight: 900;
                text-decoration: none;
            }
            .primary {
                background: #2563eb;
                color: #fff;
            }
            .secondary {
                color: #0f172a;
                border: 1px solid rgba(15, 23, 42, 0.12);
            }
        </style>
    </head>
    <body>
        <main class="card">
            <div class="eyebrow">Urxion</div>
            <h1>We hit a snag.</h1>
            <p>{{ error_message|default("Please try again.", true) }}</p>
            <div class="actions">
                <a class="primary" href="{{ url_for('index') }}">Back Home</a>
                <a class="secondary" href="{{ url_for('contact') }}"
                    >Contact Us</a
                >
            </div>
        </main>
    </body>
</html>
