<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Page Not Found | Urxion</title>
        <meta name="robots" content="noindex" />
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 2rem;
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                background: #f8fafc;
                color: #0f172a;
            }
            main {
                width: min(100%, 640px);
                padding: clamp(1.5rem, 5vw, 3rem);
                text-align: center;
                background: #fff;
                border: 1px solid rgba(15, 23, 42, 0.1);
                border-radius: 28px;
                box-shadow: 0 30px 80px rgba(15, 23, 42, 0.1);
            }
            h1 {
                margin: 0 0 1rem;
                font-size: clamp(2.5rem, 8vw, 5rem);
                letter-spacing: -0.06em;
                line-height: 0.95;
            }
            p {
                color: #475569;
                font-size: 1.1rem;
                line-height: 1.7;
            }
            a {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 3rem;
                padding: 0 1.25rem;
                border-radius: 999px;
                background: #2563eb;
                color: #fff;
                font-weight: 800;
                text-decoration: none;
            }
        </style>

    <body>
        <main>
            <h1>Page not found.</h1>
            <p>The page may have moved as we update the site.</p>
            <a href="{{ url_for('index') }}">Back Home</a>
