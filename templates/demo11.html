    <style>
        :root {
            /* Modern color scheme */
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #60a5fa;
            --light: #f8fafc;
            --dark: #0f172a;
            --text-light: #f8fafc;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            margin: 0;
            color: var(--text-dark);
            background: var(--light);
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        .hero {
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)),
                url('/static/img/hero-background.jpg') center/cover no-repeat;
            min-height: 80vh;
            display: flex;
            align-items: center;
            color: var(--text-light);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }

        .booking-form-container {
            max-width: 800px;
            margin: 0 auto 5rem;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }

        .time-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .time-slot {
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .time-slot:hover {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .time-slot.selected {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .features {
            padding: 5rem 2rem;
            background: var(--light);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            background: white;
            padding: 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 1rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            font-size: 1.5rem;
        }

        .resources {
            padding: 5rem 2rem;
            background: var(--light);
        }

        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .resource-card {
            background: white;
            padding: 2rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .resource-card h3 {
            margin-bottom: 1rem;
            color: var(--primary-dark);
            font-size: 1.5rem;
        }

        .resource-card p {
            margin-bottom: 1.5rem;
            color: var(--dark);
        }

        .cta {
            padding: 5rem 2rem;
            background: var(--primary);
            color: var(--dark);
            text-align: center;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            gap: 3rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            justify-content: flex-end;
        }

        .nav-links a {
            color: var(--dark);
            text-decoration: none;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-dark);
            color: var(--light);
            border-color: var(--primary-dark);
        }

        .btn-primary:hover {
            background: var(--light);

        .btn-light {

            border-color: var(--primary);
        }

        .btn-light:hover {
            background: var(--light);
            color: var(--primary-dark);
            border-color: var(--primary);
        }

        /* Responsive Design */

    <div class="booking-form-container">
        <form id="booking-form" class="booking-form">

            </div>

            <h3 class="mb-4">Select Three Preferred Time Slots</h3>
            <div class="time-slots" id="time-slots">
                <!-- Time slots will be dynamically populated -->
            </div>

            <div class="form-group">
                <textarea name="message" class="form-control" placeholder="Any specific topics you'd like to discuss?" rows="4"></textarea>
            </div>

            <button type="submit" class="btn btn-primary d-block w-100">Schedule Demo</button>
        </form>
    </div>

    <script>
        // Generate time slots for the next 5 business days
        function generateTimeSlots() {
            const timeSlotContainer = document.getElementById('time-slots');
            const times = ['9:00 AM', '11:00 AM', '2:00 PM', '4:00 PM'];
            const days = 5;
            const slots = [];

            for (let i = 1; i <= days; i++) {
                const date = new Date();
                date.setDate(date.getDate() + i);

                // Skip weekends
                if (date.getDay() === 0 || date.getDay() === 6) {
                    days++;
                    continue;
                }

                times.forEach(time => {
                    const slot = document.createElement('div');
                    slot.className = 'time-slot';
                    slot.dataset.datetime = `${date.toLocaleDateString()} ${time}`;
                    slot.textContent = `${date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })} ${time}`;
                    slot.onclick = () => toggleTimeSlot(slot);
                    timeSlotContainer.appendChild(slot);
                });
            }
        }

        // Handle time slot selection (max 3)
        function toggleTimeSlot(slot) {
            const selectedSlots = document.querySelectorAll('.time-slot.selected');

            if (slot.classList.contains('selected')) {
                slot.classList.remove('selected');
            } else if (selectedSlots.length < 3) {
                slot.classList.add('selected');
            } else {
                alert('Please select only 3 preferred time slots');
            }
        }

        // Form submission handler
        document.getElementById('booking-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const selectedSlots = document.querySelectorAll('.time-slot.selected');
            if (selectedSlots.length !== 3) {
                alert('Please select exactly 3 preferred time slots');
                return;
            }

            const formData = new FormData(this);
            const selectedTimes = Array.from(selectedSlots).map(slot => slot.dataset.datetime);
            formData.append('preferred_times', JSON.stringify(selectedTimes));

            // Send to your Google Apps Script endpoint
            fetch('https://script.google.com/macros/s/AKfycbxOoSGdn_ZrJdniWhlO5a1H52VmHwLN3S386bIvQyjPCUNLfYzH3r2FxbwTTdcd8xtMuw/exec', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                alert('Thank you! We will confirm your demo time shortly.');
                location.reload();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            });
        });

        // Initialize time slots on page load
        generateTimeSlots();
    </script>
