<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urxion - AI-Powered Sales Meetings That Convert</title>
    <meta name="description" content="Transform your sales process with Urxion's AI-powered qualified meetings. Get expert lead generation while you focus on closing deals and growing your business.">

    <style>
        :root {
            /* Modern color scheme */
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #60a5fa;
            --light: #f8fafc;
            --dark: #0f172a;
            --text-light: #f8fafc;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            margin: 0;
            color: var(--text-dark);
            background: var(--light);
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        .hero {
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)),
                url('/static/img/hero-background.jpg') center/cover no-repeat;
            min-height: 80vh;
            display: flex;
            align-items: center;
            color: var(--text-light);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }

        .booking-form-container {
            max-width: 800px;
            margin: 0 auto 5rem;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }

        .time-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .time-slot {
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .time-slot:hover {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .time-slot.selected {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .features {
            padding: 5rem 2rem;
            background: var(--light);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            background: white;
            padding: 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 1rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            font-size: 1.5rem;
        }

        .resources {
            padding: 5rem 2rem;
            background: var(--light);
        }

        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .resource-card {
            background: white;
            padding: 2rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .resource-card h3 {
            margin-bottom: 1rem;
            color: var(--primary-dark);
            font-size: 1.5rem;
        }

        .resource-card p {
            margin-bottom: 1.5rem;
            color: var(--dark);
        }

        .cta {
            padding: 5rem 2rem;
            background: var(--primary);
            color: var(--dark);
            text-align: center;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            gap: 3rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            justify-content: flex-end;
        }

        .nav-links a {
            color: var(--dark);
            text-decoration: none;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-dark);
            color: var(--light);
            border-color: var(--primary-dark);
        }

        .btn-primary:hover {
            background: var(--light);
            color: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        .btn-light {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        .btn-light:hover {
            background: var(--light);
            color: var(--primary-dark);
            border-color: var(--primary);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .nav-links {
                display: none;
            }

            .time-slots {
                grid-template-columns: 1fr;
            }

            .booking-form-container {
                margin: 0 auto 5rem;
                padding: 2rem;
            }
        }
    </style>

</head>
<body>

        <div class="nav-content">
            <div class="logo-container">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" class="tm-logo-img">
                    <!-- Main U Shape with Internal Cuts -->
                    <path d="
                        M140 80
                        L260 80
                        L260 100
                        L240 100
                        L240 240
                        Q240 270, 200 270
                        Q160 270, 160 240
                        L160 100
                        L140 100
                        L140 250
                        Q140 300, 200 300
                        Q260 300, 260 250
                        L260 100
                        L240 100
                        L240 80
                        L280 80
                        L280 250
                        Q280 320, 200 320
                        Q120 320, 120 250
                        L120 80
                        Z

                        M180 120
                        L220 120
                        L220 230
                        Q220 250, 200 250
                        Q180 250, 180 230
                        Z"
                        fill="currentColor"
                    />

                    <!-- Geometric Triangle Accent -->
                    <polygon
                        points="270,60 290,60 290,80"
                        fill="currentColor"
                    />
                </svg>
            </div>
            <div class="nav-links">
                <a href="{{ url_for('index') }}">Home</a>
                <a href="{{ url_for('cold_calling') }}">Cold Calling That Converts</a>
                <a href="{{ url_for('business_assessment') }}">Business Assessment</a>
                <a href="{{ url_for('knowledge_is_power') }}">Knowledge is Power</a>
                <a href="{{ url_for('demo') }}">Schedule a Demo</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Book Your Demo</h1>
            <p>See how Urxion can transform your sales process</p>
        </div>
    </section>

    <div class="booking-form-container">
        <h1>Schedule a Meeting</h1>
        <div id="alert" style="display: none;"></div>

        <form id="booking-form">
            <div class="form-group">
                <input type="text" id="name" class="form-control" placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <input type="email" id="email" class="form-control" placeholder="Your Email" required>
            </div>

            <div class="form-group">
                <input type="tel" id="phone" class="form-control" placeholder="Your Phone Number" required>
            </div>

            <div class="form-group">
                <input type="text" id="company" class="form-control" placeholder="Company Name" required>
            </div>

            <h3>Available Time Slots</h3>
            <div id="time-slots" class="time-slots">
                <!-- Time slots will be populated dynamically -->
            </div>

            <div class="form-group">
                <textarea id="message" class="form-control" placeholder="Any specific topics you'd like to discuss?" rows="4"></textarea>
            </div>

            <button type="submit" class="btn btn-primary d-block w-100">Schedule Meeting</button>
        </form>
    </div>

    <script>
        let selectedSlot = null;

        // Fetch available time slots
        async function fetchTimeSlots() {
            try {
                const response = await fetch('/get-slots');
                const data = await response.json();

                if (data.success) {
                    displayTimeSlots(data.slots);
                } else {
                    showAlert('Failed to load time slots', 'error');
                }
            } catch (error) {
                showAlert('Failed to load time slots', 'error');
            }
        }

        // Display time slots
        function displayTimeSlots(slots) {
            const container = document.getElementById('time-slots');
            container.innerHTML = '';

            slots.forEach(slot => {
                const slotElement = document.createElement('div');
                slotElement.className = 'time-slot';
                slotElement.innerHTML = `
                    <div>${new Date(slot.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
                    <div>${slot.time}</div>
                `;
                slotElement.dataset.datetime = slot.datetime;

                slotElement.addEventListener('click', () => selectTimeSlot(slotElement));
                container.appendChild(slotElement);
            });
        }

        // Handle time slot selection
        function selectTimeSlot(slotElement) {
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.classList.remove('selected');
            });
            slotElement.classList.add('selected');
            selectedSlot = slotElement.dataset.datetime;
        }

        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        // Handle form submission
        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedSlot) {
                showAlert('Please select a time slot', 'error');
                return;
            }

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                company: document.getElementById('company').value,
                message: document.getElementById('message').value,
                slot: selectedSlot
            };

            try {
                const response = await fetch('/book-meeting', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Meeting scheduled successfully! Check your email for confirmation.', 'success');
                    e.target.reset();
                    document.querySelectorAll('.time-slot').forEach(slot => {
                        slot.classList.remove('selected');
                    });
                    selectedSlot = null;
                } else {
                    showAlert(data.error || 'Failed to schedule meeting', 'error');
                }
            } catch (error) {
                showAlert('Failed to schedule meeting', 'error');
            }
        });

        // Load time slots when page loads
        fetchTimeSlots();
    </script>
