{% extends "base.html" %}
{% block title %}Something went wrong | Urxion{% endblock %}
{% block content %}
<section class="section legacy-page">
    <div class="container legacy-content">
<main class="card">
            <div class="eyebrow">Urxion</div>
            <h1>We hit a snag.</h1>
            <p>{{ error_message|default("Please try again.", true) }}</p>
            <div class="actions">
                <a class="primary" href="{{ url_for('index') }}">Back Home</a>
                <a class="secondary" href="{{ url_for('contact') }}"
                    >Contact Us</a
                >
            </div>
        </main>
    </div>
</section>
{% endblock %}
